name: CI/CD to Kubernetes with Helm

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_REPOSITORY: sagardave/devops-practice
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: docker build -t $IMAGE_REPOSITORY:$IMAGE_TAG .

      - name: Push Image
        run: docker push $IMAGE_REPOSITORY:$IMAGE_TAG

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm Upgrade
        run: |
          helm upgrade --install my-app ./devops-app \
            --set image.repository=$IMAGE_REPOSITORY \
            --set image.tag=$IMAGE_TAG

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/devops-app
